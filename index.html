<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Felipe's Blockbuster</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="app-bg" aria-hidden="true"></div>

    <header class="header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div class="brand-text">
          <h1 data-i18n="brandTitle">FELIPE'S BLOCKBUSTER</h1>
          <p class="tagline" data-i18n="tagline">Stream-style discovery &amp; rentals</p>
        </div>
      </div>
      <div class="header-actions">
        <div
          class="lang-switch"
          role="group"
          aria-label="Language"
          data-i18n-aria="langGroupAria"
        >
          <button type="button" class="lang-btn" data-set-lang="en" data-i18n="langEn">USA</button>
          <button type="button" class="lang-btn" data-set-lang="pt" data-i18n="langPt">BRASIL</button>
        </div>
        <nav class="tabs" data-i18n-aria="tabsNavAria" aria-label="Content type">
          <button type="button" data-tab="movies" data-i18n="tabMovies">Movies</button>
          <button type="button" data-tab="tv" data-i18n="tabTv">TV Shows</button>
          <button type="button" data-tab="cartoons" data-i18n="tabCartoons">Cartoons</button>
          <button type="button" data-tab="games" data-i18n="tabGames">Games</button>
        </nav>
      </div>
    </header>

    <div class="layout">
      <aside class="panel left">
        <h2 class="panel-title" data-i18n="panelRentals">My rentals</h2>
        <p class="panel-hint" data-i18n="panelRentalsHint">Up to 10 per category</p>
        <div id="rental" class="panel-list"></div>
      </aside>

      <main class="main">
        <div class="search-wrap">
          <label class="sr-only" for="search" data-i18n="searchLabel">Search catalog</label>
          <span class="search-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.3-4.3" />
            </svg>
          </span>
          <input
            id="search"
            type="search"
            autocomplete="off"
            data-i18n-placeholder="searchPlaceholder"
            placeholder="Search titles, cast, genres…"
          />
        </div>

        <section class="browse-section" aria-labelledby="browse-heading">
          <div class="section-head">
            <h2 id="browse-heading" class="section-title" data-i18n="nowAvailable">Now Available!</h2>
            <p class="section-sub" id="browse-sub">New &amp; notable releases</p>
          </div>
          <div id="grid" class="grid"></div>
        </section>
      </main>

      <aside class="panel right">
        <h2 class="panel-title" data-i18n="panelTop5">My Top 5</h2>
        <p class="panel-hint" data-i18n="panelTop5Hint">Rank your favorites</p>
        <div id="top" class="panel-list"></div>
        <p id="msg" class="panel-msg"></p>
      </aside>
    </div>

    <script src="app.js"></script>
  </body>
</html>
